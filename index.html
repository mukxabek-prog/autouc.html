<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qora Sayt</title>
    <style>
        /* Umumiy sozlamalar (Qora fon) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* 1. Kirish Animatsiyasi */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeOut 2s forwards;
            animation-delay: 1.5s; /* 1.5 sekund turadi keyin yo'qoladi */
        }

        .intro-text {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 3px;
            color: #45f3ff;
            text-shadow: 0 0 15px #45f3ff;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* 2. Asosiy Kontent qismi */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .page-content {
            display: none;
            animation: fadeInContent 0.5s ease forwards;
        }

        .page-content.active {
            display: block;
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Zukootiribdi rasmi uslubi */
        .main-img {
            max-width: 300px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(69, 243, 255, 0.2);
            transition: transform 0.3s;
        }

        .main-img:hover {
            transform: scale(1.05);
        }

        h1 {
            margin-top: 15px;
            font-size: 1.8rem;
            color: #45f3ff;
        }

        /* 3. Pastki 5 ta menyu (Navigation Bar) */
        nav {
            background: rgba(31, 40, 51, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid #45f3ff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            padding-bottom: 20px; /* Telefonlar uchun qulaylik */
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: #c5a880;
            transition: all 0.3s ease;
            flex: 1;
        }

        /* To'rtburchak rasm uchun joy */
        .menu-icon {
            width: 35px;
            height: 35px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #45f3ff;
            margin-bottom: 5px;
            transition: transform 0.2s;
        }

        .menu-text {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8d99ae;
        }

        /* Aktiv menyu effekti */
        .menu-item.active .menu-icon {
            transform: scale(1.2);
            border-color: #ff0055;
            box-shadow: 0 0 10px #ff0055;
        }

        .menu-item.active .menu-text {
            color: #ffffff;
            text-shadow: 0 0 5px #ffffff;
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text">YUKLANMOQDA...</div>
    </div>

    <main>
        <div id="page-baraban" class="page-content active">
            <img src="zukootiribdi.jpg" alt="Zukootiribdi" class="main-img">
            <h1>BARABAN BO'LIMI</h1>
        </div>

        <div id="page-crash" class="page-content">
            <img src="zukootiribdi.jpg" alt="Zukootiribdi" class="main-img">
            <h1>CRASH BO'LIMI</h1>
        </div>

        <div id="page-menu" class="page-content">
            <img src="zukootiribdi.jpg" alt="Zukootiribdi" class="main-img">
            <h1>ASOSIY MENU BO'LIMI</h1>
        </div>

        <div id="page-case" class="page-content">
            <img src="zukootiribdi.jpg" alt="Zukootiribdi" class="main-img">
            <h1>CASE BO'LIMI</h1>
        </div>

        <div id="page-profil" class="page-content">
            <img src="zukootiribdi.jpg" alt="Zukootiribdi" class="main-img">
            <h1>PROFIL BO'LIMI</h1>
        </div>
    </main>

    <nav>
        <div class="menu-item active" onclick="switchPage('baraban', this)">
            <img src="baraban.jpg" alt="Baraban" class="menu-icon">
            <span class="menu-text">Baraban</span>
        </div>

        <div class="menu-item" onclick="switchPage('crash', this)">
            <img src="raketa.jpg" alt="Raketa" class="menu-icon">
            <span class="menu-text">Crash</span>
        </div>

        <div class="menu-item" onclick="switchPage('menu', this)">
            <img src="menu.jpg" alt="Menu" class="menu-icon">
            <span class="menu-text">Menu</span>
        </div>

        <div class="menu-item" onclick="switchPage('case', this)">
            <img src="case.jpg" alt="Case" class="menu-icon">
            <span class="menu-text">Case</span>
        </div>

        <div class="menu-item" onclick="switchPage('profil', this)">
            <img src="PROFIL.png" alt="Profil" class="menu-icon">
            <span class="menu-text">Profil</span>
        </div>
    </nav>

    <script>
        function switchPage(pageId, element) {
            // Hamma sahifalarni yashirish
            const pages = document.querySelectorAll('.page-content');
            pages.forEach(page => page.classList.remove('active'));

            // Hamma menyulardan active klassini olib tashlash
            const menuItems = document.querySelectorAll('.menu-item');
            menuItems.forEach(item => item.classList.remove('active'));

            // Tanlangan sahifani ko'rsatish
            document.getElementById('page-' + pageId).classList.add('active');

            // Bosilgan menyuni aktiv qilish
            element.classList.add('active');
        }
    </script>

</body>
</html>
