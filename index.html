<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qora Sayt - Baraban va Avtorizatsiya</title>
    <style>
        /* --- Umumiy Sozlamalar --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #06070a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* --- Kirish Animatsiyasi --- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeOut 2s forwards;
            animation-delay: 1.2s;
        }

        .intro-text {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 3px;
            color: #45f3ff;
            text-shadow: 0 0 15px #45f3ff;
            animation: introPulse 1.2s infinite;
        }

        @keyframes introPulse {
            0 { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- Asosiy Fon --- */
        main {
            position: relative;
            flex-grow: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a1c23 0%, #0d0e12 50%, #050608 100%);
            background-size: 200% 200%;
            animation: gradientMove 8s ease infinite alternate;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* --- Sahifalar boshqaruvi --- */
        .page-content {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .page-content.active {
            display: flex !important;
            animation: fadeInContent 0.5s ease forwards;
        }

        .page-content.fade-out {
            opacity: 0;
            transform: scale(1.05);
            transition: all 0.5s ease;
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .content-title {
            font-size: 2rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2), 0 0 20px rgba(69, 243, 255, 0.6);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            pointer-events: none;
            text-align: center;
        }

        /* --- Tepadagi Header Modullari --- */
        .top-header {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .top-header * { pointer-events: auto; }

        .top-tokens {
            background: rgba(20, 23, 36, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 6px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
        }

        .token-icon-gold {
            font-size: 18px;
            text-shadow: 0 0 10px #fbbf24;
        }

        .login-trigger-btn {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .user-profile-header {
            display: none; 
            background: rgba(20, 23, 36, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 14px;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            object-fit: cover;
        }

        .profile-details {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .prof-username {
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .prof-tgid {
            font-size: 9px;
            color: #64748b;
        }

        /* --- Login Modal --- */
        .login-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 6, 8, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .login-modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .login-card {
            background: #141724;
            border: 2px solid #1f2336;
            width: 100%;
            max-width: 340px;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            position: relative;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .login-modal-overlay.open .login-card {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 12px; right: 15px;
            font-size: 22px;
            color: #64748b;
            cursor: pointer;
        }

        .zuko-img {
            width: 120px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .tg-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tg-icon { width: 20px; height: 20px; }
        .tg-text { font-size: 13px; font-weight: 500; color: #e2e8f0; }

        /* --- BARABAN RESPONSIVE INTEGRATSIYASI --- */
        .baraban-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            padding-top: 75px; 
        }

        .live-bets-panel {
            width: 260px;
            background: rgba(20, 23, 36, 0.8);
            backdrop-filter: blur(10px);
            border-right: 2px solid #1f2336;
            display: flex;
            flex-direction: column;
            padding: 12px;
            height: 100%;
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bets-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bet-card {
            background: #1c2033;
            padding: 8px;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }

        .bet-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 3px;
        }

        .user-name { font-weight: bold; color: #e2e8f0; }
        .bet-time { color: #64748b; font-size: 9px; }
        .bet-details { font-size: 10px; color: #94a3b8; }
        .bet-amount { color: #fbbf24; font-weight: bold; }

        .baraban-game {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 15px;
        }

        .timer-display {
            font-size: 16px;
            font-weight: bold;
            background: #1c2033;
            padding: 6px 16px;
            border-radius: 30px;
            border: 2px solid #3b82f6;
            margin-bottom: 15px;
        }

        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 15px;
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 20px solid #ef4444;
            z-index: 10;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #1f2336;
            position: relative;
            transition: transform 10s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .controls {
            background: #141724;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
        }

        .multiplier-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .mult-btn {
            background: #1c2033;
            border: 2px solid #2e354f;
            color: #fff;
            padding: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .mult-btn.active {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
        }

        .bet-inputs {
            display: flex;
            gap: 8px;
        }

        .token-input {
            flex: 1;
            background: #1c2033;
            border: 2px solid #2e354f;
            border-radius: 6px;
            padding: 8px;
            color: #fff;
            font-size: 13px;
            outline: none;
            width: 50%;
        }

        .bet-btn {
            background: linear-gradient(135deg, #00ff88, #00bc70);
            color: #0f111a;
            border: none;
            border-radius: 6px;
            padding: 0 18px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Pastki Menyular --- */
        nav {
            background: rgba(10, 12, 18, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(69, 243, 255, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
            padding-bottom: 18px;
            z-index: 20;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 60px;
        }

        .menu-icon {
            width: 36px;
            height: 36px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 4px;
        }

        .menu-text {
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #646973;
        }

        .menu-item.active .menu-icon {
            transform: scale(1.1) translateY(-2px);
            border-color: #45f3ff;
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.5);
        }

        .menu-item.active .menu-text { color: #45f3ff; }

        /* Toast */
        .toast-msg {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff88;
            color: #0f111a;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            opacity: 0;
            z-index: 2000;
            transition: 0.3s;
        }
        .toast-msg.show { opacity: 1; }

        /* ==================================================== */
        /* --- TELEFON VA PLANSHETLAR UCHUN CSS SOZLAMALARI --- */
        /* ==================================================== */
        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
            }
            .content-title {
                font-size: 1.5rem;
            }
            /* Jonli tikishlar panelini telefonda barabanning ostiga tushiramiz yoki yashiramiz */
            .baraban-wrapper {
                flex-direction: column;
                overflow-y: auto;
                padding-top: 70px;
                padding-bottom: 20px;
            }
            .live-bets-panel {
                width: 100%;
                height: 140px; /* Telefonda ixchamgina balandlik */
                border-right: none;
                border-bottom: 2px solid #1f2336;
                order: 2; /* Barabandan keyin ko'rinishi uchun */
                margin-top: 15px;
            }
            .baraban-game {
                width: 100%;
                order: 1;
                padding: 5px;
            }
            .wheel-container {
                width: 240px;
                height: 240px;
            }
            .controls {
                max-width: 100%;
            }
            .mult-btn {
                font-size: 11px;
                padding: 8px 0;
            }
            nav {
                gap: 10px;
            }
            .menu-item {
                width: 55px;
            }
            .menu-icon {
                width: 32px;
                height: 32px;
            }
            .top-header {
                top: 10px; left: 10px; right: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text">YUKLANMOQDA...</div>
    </div>

    <div class="top-header">
        <div class="top-tokens" id="header-tokens-panel">
            <span class="token-icon-gold">🪙</span>
            <div>
                <span style="font-size: 9px; color: #64748b; display: block; line-height: 1;">Balans</span>
                <span id="header-balance-val" style="font-weight: 800; color: #fbbf24; font-size: 14px;">0</span>
            </div>
        </div>

        <div id="auth-zone">
            <button class="login-trigger-btn" id="main-login-btn" onclick="toggleLoginModal(true)">Kirish</button>
            
            <div class="user-profile-header" id="main-profile-panel">
                <img src="" alt="Avatar" class="profile-avatar" id="user-avatar-img">
                <div class="profile-details">
                    <span class="prof-username copyable" id="user-nik-val" onclick="copyToClipboard(this)">@username</span>
                    <span class="prof-tgid copyable" id="user-id-val" onclick="copyToClipboard(this)">ID: 0000000</span>
                </div>
            </div>
        </div>
    </div>

    <main>
        <div id="page-baraban" class="page-content">
            <div class="baraban-wrapper">
                <div class="live-bets-panel">
                    <div class="panel-title">
                        <span>Jonli Tikishlar</span>
                        <span style="font-size: 10px; color: #64748b;">• 42 online</span>
                    </div>
                    <div class="bets-container" id="bets-list"></div>
                </div>

                <div class="baraban-game">
                    <div class="timer-display" id="timer">Aylanishga: 14s</div>

                    <div class="wheel-container">
                        <div class="pointer"></div>
                        <canvas id="wheelCanvas" class="wheel" width="320" height="320"></canvas>
                    </div>

                    <div class="controls">
                        <div class="multiplier-selector">
                            <button class="mult-btn active" onclick="selectMultiplier(this, '2x')">2x</button>
                            <button class="mult-btn" onclick="selectMultiplier(this, '3x')">3x</button>
                            <button class="mult-btn" onclick="selectMultiplier(this, '4x')">4x</button>
                            <button class="mult-btn" onclick="selectMultiplier(this, '5x')">5x</button>
                            <button class="mult-btn" onclick="selectMultiplier(this, '50x')" style="color: #ef4444;">50x</button>
                        </div>
                        <div class="bet-inputs">
                            <input type="number" id="bet-amount" class="token-input" placeholder="Token..." value="100" min="10">
                            <button id="bet-submit-btn" class="bet-btn" onclick="placeUserBet()">Tikish</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-crash" class="page-content">
            <h1 class="content-title">CRASH BO'LIMI</h1>
        </div>

        <div id="page-menu" class="page-content active">
            <h1 class="content-title">ASOSIY MENU</h1>
        </div>

        <div id="page-case" class="page-content">
            <h1 class="content-title">CASE BO'LIMI</h1>
        </div>

        <div id="page-profil" class="page-content">
            <h1 class="content-title">PROFIL BO'LIMI</h1>
        </div>
    </main>

    <nav>
        <div class="menu-item" onclick="switchPage('baraban', this)">
            <img src="baraban.png" alt="Baraban" class="menu-icon">
            <span class="menu-text">Baraban</span>
        </div>
        <div class="menu-item" onclick="switchPage('crash', this)">
            <img src="raketa.png" alt="Raketa" class="menu-icon">
            <span class="menu-text">Crash</span>
        </div>
        <div class="menu-item active" onclick="switchPage('menu', this)">
            <img src="menu.png" alt="Menu" class="menu-icon">
            <span class="menu-text">Menu</span>
        </div>
        <div class="menu-item" onclick="switchPage('case', this)">
            <img src="case.png" alt="Case" class="menu-icon">
            <span class="menu-text">Case</span>
        </div>
        <div class="menu-item" onclick="switchPage('profil', this)">
            <img src="PROFIL.png" alt="Profil" class="menu-icon">
            <span class="menu-text">Profil</span>
        </div>
    </nav>

    <div class="login-modal-overlay" id="loginModal">
        <div class="login-card">
            <span class="close-modal" onclick="toggleLoginModal(false)">&times;</span>
            <img src="zukosalom.jpg" alt="ZukoSalom" class="zuko-img">
            <div class="tg-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="TG" class="tg-icon">
                <span class="tg-text">Telegram orqali kirish</span>
            </div>
            <div style="display: inline-block;">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-login="veko_uc_bot" 
                        data-size="large" 
                        data-onauth="onTelegramAuth(user)" 
                        data-request-access="write"></script>
            </div>
        </div>
    </div>

    <div class="toast-msg" id="toast">Nusxa olindi!</div>

    <script>
        let currentTimeout;
        let isAuthorized = false; 
        let userName = "";
        let userTelegramId = "";
        let userBalance = 0; 

        window.onload = function() {
            startFadeTimeout(document.getElementById('page-menu'));
            drawWheel(); 
            document.getElementById('header-balance-val').innerText = userBalance;
        };

        function switchPage(pageId, element) {
            clearTimeout(currentTimeout);
            const pages = document.querySelectorAll('.page-content');
            pages.forEach(page => page.classList.remove('active', 'fade-out'));

            const menuItems = document.querySelectorAll('.menu-item');
            menuItems.forEach(item => item.classList.remove('active'));

            const selectedPage = document.getElementById('page-' + pageId);
            selectedPage.classList.add('active');
            element.classList.add('active');

            if (pageId !== 'baraban') {
                startFadeTimeout(selectedPage);
            }
        }

        function startFadeTimeout(pageElement) {
            currentTimeout = setTimeout(() => {
                pageElement.classList.add('fade-out');
                setTimeout(() => {
                    if(pageElement.classList.contains('fade-out')) {
                        pageElement.classList.remove('active');
                    }
                }, 500);
            }, 1000); 
        }

        function toggleLoginModal(show) {
            const modal = document.getElementById('loginModal');
            if (show) modal.classList.add('open'); else modal.classList.remove('open');
        }

        // ⚙️ BOT SERVER MANZILI — o'zingizning server IP/domeningizni yozing
        // Masalan: 'http://192.168.1.100:3000' yoki 'https://sizning-server.com'
        const BOT_API_URL = 'http://localhost:3000';

        // --- TELEGRAM LOGIN CALLBACK ---
        async function onTelegramAuth(user) {
            isAuthorized = true;
            toggleLoginModal(false);
            document.getElementById('main-login-btn').style.display = 'none';
            document.getElementById('main-profile-panel').style.display = 'flex';

            const avatarUrl = user.photo_url || "https://www.w3schools.com/howto/img_avatar.png"; 
            document.getElementById('user-avatar-img').src = avatarUrl;
            
            const usernameText = user.username ? "@" + user.username : user.first_name;
            document.getElementById('user-nik-val').innerText = usernameText;
            document.getElementById('user-id-val').innerText = "ID: " + user.id;

            userName = user.first_name;
            userTelegramId = user.id;

            try {
                // Foydalanuvchini ro'yxatdan o'tkazish va tokenlarni olish
                const regRes = await fetch(`${BOT_API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(user)
                });
                const regData = await regRes.json();
                userBalance = regData.tokens || 0;
                document.getElementById('header-balance-val').innerText = userBalance;
            } catch (err) {
                console.log("Backend ulanmadi, 0 token berildi.");
                userBalance = 0;
                document.getElementById('header-balance-val').innerText = userBalance;
            }
        }

        function copyToClipboard(element) {
            let textToCopy = element.innerText;
            if(textToCopy.startsWith("ID: ")) textToCopy = textToCopy.replace("ID: ", "");
            navigator.clipboard.writeText(textToCopy).then(() => {
                const toast = document.getElementById('toast');
                toast.innerText = `"${textToCopy}" nusxalandi!`;
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 2000);
            }).catch(err => console.error(err));
        }

        const sectors = [
            { label: '2x', color: '#3b82f6', textColor: '#fff' },
            { label: '3x', color: '#10b981', textColor: '#fff' },
            { label: '2x', color: '#3b82f6', textColor: '#fff' },
            { label: '4x', color: '#a855f7', textColor: '#fff' },
            { label: '2x', color: '#3b82f6', textColor: '#fff' },
            { label: '5x', color: '#f59e0b', textColor: '#fff' },
            { label: '3x', color: '#10b981', textColor: '#fff' },
            { label: '50x', color: '#ef4444', textColor: '#fff' }
        ];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const numSectors = sectors.length;
        const arc = Math.PI * 2 / numSectors;

        let currentRotation = 0;
        let isSpinning = false;
        let countdown = 14;
        let selectedMultiplier = '2x'; 
        let currentBet = null;

        function drawWheel() {
            ctx.clearRect(0, 0, 320, 320);
            for (let i = 0; i < numSectors; i++) {
                let angle = i * arc;
                ctx.fillStyle = sectors[i].color;
                ctx.beginPath();
                ctx.moveTo(160, 160);
                ctx.arc(160, 160, 150, angle, angle + arc);
                ctx.lineTo(160, 160);
                ctx.fill();
                ctx.strokeStyle = '#141724';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = sectors[i].textColor;
                ctx.translate(160, 160);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.font = "bold 14px Poppins";
                ctx.fillText(sectors[i].label, 135, 5);
                ctx.restore();
            }
        }

        function selectMultiplier(btn, val) {
            if(isSpinning) return;
            document.querySelectorAll('.mult-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedMultiplier = val;
        }

        function placeUserBet() {
            if (!isAuthorized) {
                alert("Tikish uchun avval Telegram orqali tizimga kiring!");
                toggleLoginModal(true);
                return;
            }

            if(isSpinning || currentBet) return;
            const amountInput = document.getElementById('bet-amount');
            const amount = parseInt(amountInput.value);

            if(isNaN(amount) || amount <= 0 || amount > userBalance) {
                alert("Tokenlaringiz miqdori noto'g'ri yoki yetarli emas!");
                return;
            }

            userBalance -= amount;
            document.getElementById('header-balance-val').innerText = userBalance;
            currentBet = { amount: amount, chosen: selectedMultiplier };

            document.getElementById('bet-submit-btn').disabled = true;
            document.getElementById('bet-submit-btn').innerText = "Tikildi";
            addBetToPanel(userName, "ID: " + userTelegramId, amount, selectedMultiplier);
            
            // Tikilgan tokenlarni bot bazasidan ayirish
            if (userTelegramId) {
                fetch(`${BOT_API_URL}/api/deduct-tokens`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tg_id: userTelegramId, amount: amount })
                }).catch(() => {});
            }
        }

        function addBetToPanel(name, id, amount, chosen, status = '') {
            const list = document.getElementById('bets-list');
            if(!list) return;
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const card = document.createElement('div');
            card.className = `bet-card ${status}`;
            card.innerHTML = `
                <div class="bet-info">
                    <span class="user-name">${name} <span style="font-size:9px; color:#64748b;">${id}</span></span>
                    <span class="bet-time">${now}</span>
                </div>
                <div class="bet-info" style="margin:0;">
                    <span class="bet-details">Tanlov: <b style="color:#fff">${chosen}</b></span>
                    <span class="bet-amount">${amount} TOK</span>
                </div>
            `;
            list.insertBefore(card, list.firstChild);
            if(list.children.length > 15) list.removeChild(list.lastChild);
        }

        function simulateBotBets() {
            if(isSpinning) return;
            const botNames = ["Ali_Dev", "Shadow_UZ", "King_Crypto", "Ronaldo7", "Bella_01"];
            const choices = ["2x", "3x", "4x", "5x"];
            if(Math.random() > 0.4) {
                const name = botNames[Math.floor(Math.random() * botNames.length)];
                const id = "ID: " + Math.floor(1000 + Math.random() * 9000);
                const amount = Math.floor(Math.random() * 5) * 100 + 50;
                const chosen = choices[Math.floor(Math.random() * choices.length)];
                addBetToPanel(name, id, amount, chosen);
            }
        }

        function getRandomSectorIndex() {
            let index = Math.floor(Math.random() * numSectors);
            if(sectors[index].label === '50x' && Math.random() < 0.98) {
                return getRandomSectorIndex();
            }
            return index;
        }

        function spinWheel() {
            isSpinning = true;
            document.getElementById('timer').innerText = "Aylanmoqda...";
            const targetSectorIndex = getRandomSectorIndex();
            const winningSector = sectors[targetSectorIndex];

            const sectorAngle = 360 / numSectors;
            const targetAngle = 270 - (targetSectorIndex * sectorAngle) - (sectorAngle / 2);
            currentRotation += (5 * 360) + (targetAngle - (currentRotation % 360));

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => { endRound(winningSector.label); }, 10000); 
        }

        function endRound(winningLabel) {
            isSpinning = false;
            if(currentBet) {
                if(currentBet.chosen === winningLabel) {
                    let winAmount = currentBet.amount * parseInt(winningLabel);
                    userBalance += winAmount;
                    alert(`Tabriklaymiz! Siz yutdingiz: ${winAmount} TOK`);
                    // Yutuqni bot bazasiga qo'shish
                    if (userTelegramId) {
                        fetch(`${BOT_API_URL}/api/add-tokens`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ tg_id: userTelegramId, amount: winAmount })
                        }).catch(() => {});
                    }
                } else {
                    alert(`Afsus, baraban ${winningLabel} bo'ldi.`);
                }
                document.getElementById('header-balance-val').innerText = userBalance;
            }
            currentBet = null;
            document.getElementById('bet-submit-btn').disabled = false;
            document.getElementById('bet-submit-btn').innerText = "Tikish";
            countdown = 14;
        }

        setInterval(() => {
            const barabanPage = document.getElementById('page-baraban');
            if(barabanPage.classList.contains('active') && !isSpinning) {
                if(countdown > 0) {
                    countdown--;
                    document.getElementById('timer').innerText = `Aylanishga: ${countdown}s`;
                    simulateBotBets();
                } else {
                    spinWheel();
                }
            } else if (!barabanPage.classList.contains('active') && !isSpinning) {
                if(countdown > 0) countdown--; else countdown = 14;
            }
        }, 1000);
    </script>
</body>
</html>
