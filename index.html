<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1c1c1c; color: white; }
        .balance { font-size: 24px; color: gold; margin-top: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0088cc; border: none; color: white; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>BullDrop Mini</h1>
    <div class="balance">Balans: <span id="balance">0</span> token</div>
    <br><br>
    <button onclick="playGame()">100 token bilan o'ynash</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Oynani to'liq ochish

        const userId = tg.initDataUnsafe.user.id; // Telegramdan ID ni olish
        let currentBalance = 0;

        // Balansni yuklash
        fetch(`/api/user/${userId}`)
            .then(res => res.json())
            .then(data => {
                currentBalance = data.balance;
                document.getElementById('balance').innerText = currentBalance;
            });

        // O'yin funksiyasi
        function playGame() {
            fetch('/api/play', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, bet: 100 })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) return alert(data.error);
                
                document.getElementById('balance').innerText = data.balance;
                alert(data.win ? "Tabriklaymiz! Yutdingiz!" : "Afsus, yutqazdingiz.");
            });
        }
    </script>
</body>
</html>
